<div class="container mt-5">

    <h2 class="text-center mb-5">
        Contact GingerCart
    </h2>

    <div class="row">

        <!-- Contact Form -->

        <div class="col-md-6">

            <div class="card shadow p-4 h-100">

                <h4 class="mb-4">
                    Send Us a Message
                </h4>

                <form>

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter your name">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               placeholder="Enter your email">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Message
                        </label>

                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Type your message">
                        </textarea>

                    </div>

                    <button class="btn btn-primary w-100">
                        Submit
                    </button>

                </form>

            </div>

        </div>

        <!-- Location -->

        <div class="col-md-6">

            <div class="card shadow p-4 h-100">

                <h4 class="mb-4">
                    Our Location
                </h4>

                <iframe
                    src="https://maps.google.com/maps?q=Kochi&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    width="100%"
                    height="250"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>

                <hr>

                <p>
                    <strong>GingerCart Store</strong>
                </p>

                <p>
                    Infopark, Kakkanad<br>
                    Kochi, Kerala
                </p>

                <p>
                    📞 +91 98765 43210
                </p>

                <p>
                    📧 support@gingercart.com
                </p>

            </div>

        </div>

    </div>

</div>
